{% extends 'base.html' %}

{% block title %}QuizApp — Modifier la Question{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; padding: 20px 0;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin-bottom: 0;">Modifier la Question</h2>
        <a href="{{ url_for('main.add_question', quiz_id=question.quiz_id) }}" class="btn btn-secondary btn-sm">Annuler</a>
    </div>

    <form method="POST" style="background: var(--glass-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 32px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group">
            <label>Énoncé de la Question</label>
            <input type="text" name="text" required value="{{ question.text }}">
        </div>

        <label>Options (cochez la bonne réponse)</label>
        <div id="options_container" class="options-vertical">
            {% for opt in question.options %}
            <div class="option-row" style="display: flex; gap: 10px; align-items: center;">
                <input type="radio" name="correct_answer_index" value="{{ loop.index0 }}" {% if opt.is_correct %}checked{% endif %} required>
                <input type="text" name="options[]" value="{{ opt.text }}" required placeholder="Option" style="flex: 1;">
                <button type="button" class="btn-icon danger" onclick="removeOption(this)">×</button>
            </div>
            {% endfor %}
        </div>

        <button type="button" class="btn btn-secondary btn-sm" onclick="addOption()" style="margin-top: 10px;">
            + Ajouter une Option
        </button>

        <div style="margin-top: 28px;">
            <button type="submit" class="btn btn-blue btn-block">Mettre à jour</button>
        </div>
    </form>
</div>

<script>
    function addOption() {
        const container = document.getElementById('options_container');
        const index = container.children.length;
        const div = document.createElement('div');
        div.className = 'option-row';
        div.style.cssText = 'display: flex; gap: 10px; align-items: center;';
        div.innerHTML = `
            <input type="radio" name="correct_answer_index" value="${index}" required>
            <input type="text" name="options[]" required placeholder="Option" style="flex: 1;">
            <button type="button" class="btn-icon danger" onclick="removeOption(this)">×</button>
        `;
        container.appendChild(div);
        updateIndices();
    }

    function removeOption(btn) {
        const container = document.getElementById('options_container');
        if (container.children.length <= 2) {
            alert("Il faut au moins 2 options.");
            return;
        }
        btn.parentElement.remove();
        updateIndices();
    }

    function updateIndices() {
        const container = document.getElementById('options_container');
        Array.from(container.children).forEach((row, idx) => {
            row.querySelector('input[type="radio"]').value = idx;
        });
    }
</script>
{% endblock %}
