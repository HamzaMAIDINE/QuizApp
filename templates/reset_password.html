{% extends 'base.html' %}

{% block title %}QuizApp — Réinitialisation{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding: 20px 0; text-align: center;">
    <div style="margin-bottom: 32px;">
        <div style="font-size: 2.5rem; margin-bottom: 12px;">🔑</div>
        <h2 style="margin-bottom: 8px;">Réinitialisation</h2>
        <p style="font-size: 0.95rem;">Entrez votre code de récupération et votre nouveau mot de passe.</p>
    </div>

    <form method="POST" style="background: var(--glass-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 32px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group" style="margin-bottom: 20px;">
            <label for="recovery_code" style="text-align: left;">Code de Récupération</label>
            <input type="text" name="recovery_code" id="recovery_code" required placeholder="Entrez le code"
                style="text-align: center; font-size: 1.05rem; letter-spacing: 1px; padding: 14px 20px;">
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label for="new_password" style="text-align: left;">Nouveau Mot de Passe</label>
            <input type="password" name="new_password" id="new_password" required placeholder="Nouveau mot de passe"
                style="text-align: center; padding: 14px 20px;">
        </div>

        <button type="submit" class="btn btn-block" style="font-size: 1rem;">
            Réinitialiser
        </button>
    </form>

    <div style="margin-top: 28px; background: var(--glass-bg); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 20px;">
        <p style="font-size: 0.9rem; margin-bottom: 12px;">Vous avez perdu votre code ?</p>
        <form action="{{ url_for('main.trigger_emergency_code') }}" method="POST" style="margin: 0;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <button type="submit" class="btn btn-secondary" style="font-size: 0.85rem;">
                Générer un code d'urgence (Console Serveur)
            </button>
        </form>
    </div>

    <div style="margin-top: 24px;">
        <a href="{{ url_for('main.teacher_login') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: var(--transition-base);"
           onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-muted)'">
            ← Retour à la connexion
        </a>
    </div>
</div>
{% endblock %}
